<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Klasifikasi Kualitas Telur - Capstone AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-brown: #543520;
            --accent-cream: #E7D5A5;
            --white: #FFFFFF;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--primary-brown);
            min-height: 100vh;
            margin: 0;
            position: relative;
            /* Set Background Gambar */
            background: url("{{ url_for('static', filename='bg egg.jpg') }}") no-repeat center center fixed;
            background-size: cover;
        }

        /* Overlay semi-transparan agar konten utama tetap scannable & readable */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(40, 25, 15, 0.45); /* Black/Brown overlay */
            backdrop-filter: blur(3px); /* Efek blur halus di background */
            z-index: -1;
        }

        .main-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .main-card {
            border-radius: 20px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(231, 213, 165, 0.3);
            background-color: rgba(255, 255, 255, 0.95); /* Sedikit transparan/glassmorphism */
        }

        .header-title {
            color: #FFFFFF;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.6);
        }

        .header-subtitle {
            color: #E7D5A5;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.6);
        }

        .upload-area {
            border: 2px dashed var(--primary-brown);
            border-radius: 14px;
            padding: 35px 20px;
            text-align: center;
            background-color: var(--accent-cream);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-area:hover {
            background-color: #dfce9d;
            transform: translateY(-2px);
        }

        .btn-custom {
            background-color: var(--primary-brown);
            color: var(--accent-cream);
            border: none;
            border-radius: 10px;
            font-size: 1.05rem;
            transition: all 0.2s ease;
        }

        .btn-custom:hover {
            background-color: #3f2616;
            color: var(--white);
        }

        .btn-custom:disabled {
            background-color: #8c7362;
            color: #d1c5b8;
        }

        #preview-img {
            max-height: 240px;
            border-radius: 10px;
            display: none;
            border: 3px solid var(--primary-brown);
        }

        .badge-status {
            font-size: 1.2rem;
            padding: 8px 24px;
            border-radius: 30px;
            font-weight: 600;
        }

        .bg-good {
            background-color: #2e7d32;
            color: #ffffff;
        }
        .bg-crack {
            background-color: #c62828;
            color: #ffffff;
        }
        .bg-empty {
            background-color: #ef6c00;
            color: #ffffff;
        }
    </style>
</head>
<body>

<div class="container main-container py-5">
    <div class="row justify-content-center w-100 m-0">
        <div class="col-md-7 col-lg-6">
            
            <!-- Header -->
            <div class="text-center mb-4">
                <h2 class="fw-bold header-title">Deteksi Kerusakan & Kualitas Telur</h2>
                <p class="header-subtitle mb-0">Proyek Capstone AI - Klasifikasi Berbasis Deep Learning</p>
            </div>

            <!-- Upload Card -->
            <div class="card main-card p-4 mb-4">
                <form id="upload-form" enctype="multipart/form-data">
                    <div class="upload-area mb-3" onclick="document.getElementById('file-input').click();">
                        <div id="upload-placeholder">
                            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="#543520" class="bi bi-cloud-upload mb-2" viewBox="0 0 16 16">
                                <path fill-rule="evenodd" d="M4.406 1.342A5.53 5.53 0 0 1 8 0c2.69 0 4.923 2 5.166 4.579C14.758 4.804 16 6.137 16 7.773 16 9.569 14.502 11 12.687 11H10a.5.5 0 0 1 0-1h2.688C13.979 10 15 8.988 15 7.773c0-1.216-1.02-2.228-2.313-2.228h-.5v-.5C12.188 2.825 10.328 1 8 1a4.53 4.53 0 0 0-2.941 1.1c-.757.652-1.153 1.438-1.153 2.055v.448l-.445.049C2.064 4.805 1 5.952 1 7.318 1 8.785 2.23 10 3.781 10H6a.5.5 0 0 1 0 1H3.781C1.708 11 0 9.366 0 7.318c0-1.763 1.266-3.223 2.942-3.593.143-.863.698-1.723 1.464-2.383z"/>
                                <path fill-rule="evenodd" d="M7.646 4.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 5.707V14.5a.5.5 0 0 1-1 0V5.707L5.354 7.854a.5.5 0 1 1-.708-.708l3-3z"/>
                            </svg>
                            <h5 class="fw-bold" style="color: var(--primary-brown);">Klik atau Tarik Foto Telur ke Sini</h5>
                            <p class="small text-muted mb-0">Format pendukung: JPG, JPEG, PNG</p>
                        </div>
                        <img id="preview-img" src="" alt="Preview Telur" class="img-fluid mx-auto">
                    </div>
                    <input type="file" id="file-input" name="file" accept="image/*" style="display: none;" onchange="previewFile()">
                    <button type="submit" class="btn btn-custom w-100 fw-bold py-2 mt-2" id="btn-predict" disabled>Jalankan Prediksi</button>
                </form>
            </div>

            <!-- Card Hasil Prediksi -->
            <div id="result-card" class="card main-card p-4 text-center" style="display: none;">
                <h5 class="text-muted mb-3">Hasil Analisis Model</h5>
                <div class="mb-3">
                    <span id="res-class" class="badge badge-status bg-good">Good</span>
                </div>
                <p class="mb-0 text-secondary">Tingkat Keyakinan (Confidence): <strong id="res-conf" style="color: var(--primary-brown);">0%</strong></p>
            </div>

        </div>
    </div>
</div>

<script>
    function previewFile() {
        const file = document.getElementById('file-input').files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('preview-img').src = e.target.result;
                document.getElementById('preview-img').style.display = 'block';
                document.getElementById('upload-placeholder').style.display = 'none';
                document.getElementById('btn-predict').disabled = false;
            }
            reader.readAsDataURL(file);
        }
    }

    document.getElementById('upload-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const fileInput = document.getElementById('file-input');
        if (!fileInput.files[0]) return;

        const formData = new FormData();
        formData.append('file', fileInput.files[0]);

        const btn = document.getElementById('btn-predict');
        btn.disabled = true;
        btn.innerText = "Menganalisis...";

        try {
            const response = await fetch('/predict', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (data.success) {
                const resCard = document.getElementById('result-card');
                const resClass = document.getElementById('res-class');
                const resConf = document.getElementById('res-conf');

                resClass.innerText = data.class;
                resConf.innerText = data.confidence;

                // Atur warna badge sesuai hasil
                resClass.className = 'badge badge-status ';
                if (data.class === 'Good') resClass.classList.add('bg-good');
                else if (data.class === 'Crack') resClass.classList.add('bg-crack');
                else resClass.classList.add('bg-empty');

                resCard.style.display = 'block';
            } else {
                alert('Error: ' + data.error);
            }
        } catch (err) {
            alert('Terjadi kesalahan saat menghubungkan ke server.');
        } finally {
            btn.disabled = false;
            btn.innerText = "Jalankan Prediksi";
        }
    });
</script>
</body>
</html>
